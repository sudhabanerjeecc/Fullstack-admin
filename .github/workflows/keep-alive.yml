name: Keep Supabase Alive

on:
  schedule:
    - cron: "0 0 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping keep alive endpoint
        run: |
          curl -X GET "${{ secrets.KEEP_ALIVE_URL }}" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"